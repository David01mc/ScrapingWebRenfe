<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>
  <!-- Train body -->
  <rect x="5" y="9" width="22" height="12" rx="3" fill="#d62d61"/>
  <!-- Front nose (left) -->
  <path d="M5 12 Q3 14 5 16 Z" fill="#b8254f"/>
  <!-- Windows -->
  <rect x="8"  y="12" width="5" height="4" rx="1.2" fill="#0d1117" opacity="0.75"/>
  <rect x="15" y="12" width="5" height="4" rx="1.2" fill="#0d1117" opacity="0.75"/>
  <!-- Speed lines -->
  <line x1="3" y1="13" x2="6" y2="13" stroke="#f2c500" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="2" y1="16" x2="5" y2="16" stroke="#f2c500" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <!-- Underbody -->
  <rect x="7" y="21" width="18" height="2" rx="1" fill="#b8254f"/>
  <!-- Wheels -->
  <circle cx="11" cy="25" r="2.8" fill="#161b22" stroke="#d62d61" stroke-width="1.5"/>
  <circle cx="21" cy="25" r="2.8" fill="#161b22" stroke="#d62d61" stroke-width="1.5"/>
  <!-- Rail -->
  <line x1="4" y1="28.5" x2="28" y2="28.5" stroke="#30363d" stroke-width="1" stroke-linecap="round"/>
</svg>
